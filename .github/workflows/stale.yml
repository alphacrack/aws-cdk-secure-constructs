name: Close stale issues and PRs

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'p1,pinned,security'
          exempt-pr-labels: 'p1,pinned,security'
          stale-issue-message: >
            This issue has been inactive for 30 days and will be closed in 7 days
            if there is no further activity. Add a comment or remove the stale
            label to keep it open.
          stale-pr-message: >
            This pull request has been inactive for 30 days and will be closed in
            7 days if there is no further activity.
          close-issue-message: Closing due to inactivity. Feel free to reopen.
          close-pr-message: Closing due to inactivity. Feel free to reopen.
